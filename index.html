<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de pointage</title>
<meta name="theme-color" content="#0C1417">
<meta name="description" content="Encodage et suivi des horaires — boni/mali, jours ouvrés, dashboard.">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-512.png" sizes="512x512" type="image/png">
<link rel="apple-touch-icon" href="./icons/icon-512.png">
<style>
  :root{
    --ink-950:#0C1417;
    --ink-900:#121D22;
    --ink-800:#182731;
    --ink-700:#22343F;
    --line:#2C4048;
    --paper:#ECE7DA;
    --text-primary:#E9E5D8;
    --text-muted:#8CA2A8;
    --text-faint:#5B6E73;
    --amber:#E8A33D;
    --amber-dim:#7A5B27;
    --teal:#4FA3A3;
    --boni:#7FBE8F;
    --boni-dim:#2C3B2F;
    --mali:#D2694F;
    --mali-dim:#3E2A24;
    --radius:10px;
    --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Consolas, monospace;
    --sans: 'IBM Plex Sans', ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink-950);
    color:var(--text-primary);
    font-family:var(--sans);
    min-height:100vh;
    padding:28px 20px 80px;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(232,163,61,0.05), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(79,163,163,0.06), transparent 45%);
  }
  .wrap{max-width:1080px;margin:0 auto;}

  /* ---------- Header / punch card ---------- */
  .cardhead{
    background:linear-gradient(180deg, var(--ink-800), var(--ink-900));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px 26px;
    position:relative;
    overflow:hidden;
    margin-bottom:18px;
  }
  .cardhead::before{
    content:"";
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 34px);
    pointer-events:none;
  }
  .cardhead-top{
    display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;
  }
  .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--text-muted); display:flex; align-items:center; gap:8px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--amber); box-shadow:0 0 8px var(--amber); animation:pulse 2.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @media (prefers-reduced-motion: reduce){.dot{animation:none;}}
  .titlebar{display:flex;align-items:baseline;gap:10px;margin-top:4px;}
  h1{font-family:var(--mono);font-size:22px;font-weight:600;margin:0;letter-spacing:.01em;}
  .monthnav{display:flex;align-items:center;gap:10px;}
  .monthnav button{
    background:var(--ink-700); border:1px solid var(--line); color:var(--text-primary);
    width:30px;height:30px;border-radius:7px;cursor:pointer;font-family:var(--mono);font-size:14px;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .monthnav button:hover{background:#2C424E;}
  .monthlabel{font-family:var(--mono);font-size:14px;color:var(--text-muted);min-width:150px;text-align:center;text-transform:capitalize;}

  .balance-row{
    display:flex; gap:28px; margin-top:18px; flex-wrap:wrap; align-items:flex-end;
  }
  .balance-main .num{
    font-family:var(--mono); font-size:44px; font-weight:600; line-height:1;
    letter-spacing:-.01em;
  }
  .balance-main .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:6px;}
  .num.boni{color:var(--boni);}
  .num.mali{color:var(--mali);}
  .num.zero{color:var(--text-muted);}
  .badge{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:5px;margin-left:10px;vertical-align:middle;}
  .badge.boni{background:var(--boni-dim);color:var(--boni);border:1px solid var(--boni);}
  .badge.mali{background:var(--mali-dim);color:var(--mali);border:1px solid var(--mali);}
  .badge.zero{background:var(--ink-700);color:var(--text-muted);border:1px solid var(--line);}
  .syncbadge{position:fixed;top:14px;right:16px;font-family:var(--mono);font-size:10.5px;padding:5px 10px;border-radius:6px;background:var(--ink-800);border:1px solid var(--line);z-index:40;}
  .syncbadge.sync-ok{color:var(--boni);}
  .syncbadge.sync-saving{color:var(--amber);}
  .syncbadge.sync-error{color:var(--mali);}
  @media(max-width:640px){ .syncbadge{position:static;display:inline-block;margin-bottom:10px;} }
  .stat{min-width:110px;}
  .stat .num{font-family:var(--mono);font-size:20px;font-weight:600;}
  .stat .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-top:4px;}

  .punchdots{display:flex;gap:4px;margin-top:16px;flex-wrap:wrap;}
  .pd{width:11px;height:16px;border-radius:2px;background:var(--ink-700);border:1px solid var(--line);}
  .pd[data-s="presence"]{background:var(--teal);border-color:var(--teal);}
  .pd[data-s="absence"]{background:var(--amber-dim);border-color:var(--amber);}
  .pd[data-s="empty"]{background:transparent;}
  .pd[data-s="weekend"]{background:transparent;border-style:dashed;opacity:.35;}

  .lifetime{
    margin-top:16px;padding-top:14px;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:12px;color:var(--text-muted);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
  }
  .lifetime b{color:var(--text-primary);}
  .lifetime .val.boni{color:var(--boni);}
  .lifetime .val.mali{color:var(--mali);}

  /* ---------- Table ---------- */
  .tablewrap{
    background:var(--ink-900); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
  }
  table{width:100%;border-collapse:collapse;}
  thead th{
    text-align:left; font-family:var(--mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--text-muted); padding:11px 10px; border-bottom:1px solid var(--line); font-weight:500;
    background:var(--ink-800);
  }
  tbody tr{border-bottom:1px solid var(--line);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr.weekend{background:rgba(255,255,255,0.012);}
  tbody tr.today{background:rgba(232,163,61,0.05);}
  tbody tr.unfilled td.deltacell{box-shadow: inset 3px 0 0 var(--amber-dim);}
  td{padding:9px 10px;vertical-align:middle;font-size:13px;}
  .daycell{font-family:var(--mono);white-space:nowrap;}
  .daynum{font-weight:600;}
  .dayname{color:var(--text-muted);font-size:11px;}
  .weekend-label{color:var(--text-faint);font-family:var(--mono);font-size:12px;font-style:italic;}

  select, input[type=time], input[type=text]{
    background:var(--ink-800); border:1px solid var(--line); color:var(--text-primary);
    border-radius:6px; padding:5px 7px; font-family:var(--sans); font-size:12.5px; outline:none;
    transition:border-color .15s;
  }
  input[type=time]{font-family:var(--mono);}
  select:focus, input:focus{border-color:var(--teal);}
  select{min-width:150px;}
  .times{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
  .times .sep{color:var(--text-faint);font-size:11px;}
  .times input{width:78px;}
  .break-warn{color:var(--mali);font-size:10.5px;font-family:var(--mono);margin-left:4px;}
  .ot-row{display:flex;align-items:center;gap:5px;margin-top:5px;}
  .ot-row label{font-family:var(--mono);font-size:10.5px;color:var(--text-muted);display:flex;align-items:center;gap:5px;cursor:pointer;}
  .ot-row input[type=checkbox]{accent-color:var(--amber);cursor:pointer;}
  .note-input{width:100%;min-width:110px;}
  .deltacell{font-family:var(--mono);font-weight:600;white-space:nowrap;}
  .deltacell.boni{color:var(--boni);}
  .deltacell.mali{color:var(--mali);}
  .deltacell.zero{color:var(--text-faint);}
  .worked-min{font-family:var(--mono);font-size:11px;color:var(--text-muted);display:block;margin-top:2px;}
  .empty-flag{font-family:var(--mono);font-size:10.5px;color:var(--amber);}
  .tag{
    display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;
    padding:2px 6px;border-radius:4px;border:1px solid var(--line);color:var(--text-muted);
  }

  /* ---------- Summary panel ---------- */
  .summary{
    margin-top:18px; background:var(--ink-900); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 22px; display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px;
  }
  .summary .cell .num{font-family:var(--mono);font-size:19px;font-weight:600;}
  .summary .cell .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-top:4px;}
  .summary .formula{grid-column:1/-1;border-top:1px solid var(--line);padding-top:12px;margin-top:2px;font-family:var(--mono);font-size:11.5px;color:var(--text-muted);}
  .summary .formula b{color:var(--text-primary);}

  /* ---------- Dashboard ---------- */
  .dashboard{margin-top:18px;background:var(--ink-900);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;}
  .dash-title{font-family:var(--mono);font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:14px;text-transform:capitalize;}
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:18px;}
  .dash-card{background:var(--ink-800);border:1px solid var(--line);border-radius:8px;padding:12px 14px;}
  .dash-card-num{font-family:var(--mono);font-size:24px;font-weight:600;}
  .dash-card-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--text-muted);margin-top:5px;line-height:1.5;}
  .dash-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:20px;border-top:1px solid var(--line);padding-top:16px;}
  .bd-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;}
  .bd-row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--line);}
  .bd-row:last-child{border-bottom:none;}
  .bd-count{font-family:var(--mono);color:var(--teal);}
  .bd-empty{font-family:var(--mono);font-size:11.5px;color:var(--text-faint);}
  @media(max-width:640px){ .dash-breakdown{grid-template-columns:1fr;} }

  /* ---------- Footer controls ---------- */
  .footerbar{display:flex;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap;gap:10px;}
  .textbtn{
    background:none;border:none;color:var(--text-muted);font-family:var(--mono);font-size:11.5px;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:4px 0;
  }
  .textbtn:hover{color:var(--text-primary);}
  .settingsbtn{
    background:var(--ink-800);border:1px solid var(--line);color:var(--text-primary);
    font-family:var(--mono);font-size:11.5px;padding:8px 14px;border-radius:7px;cursor:pointer;
  }
  .settingsbtn:hover{border-color:var(--teal);}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(6,10,12,0.65);display:none;align-items:center;justify-content:center;
    z-index:50;padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--ink-900);border:1px solid var(--line);border-radius:var(--radius);
    max-width:520px;width:100%;max-height:82vh;overflow-y:auto;padding:22px 24px;
  }
  .modal h2{font-family:var(--mono);font-size:15px;margin:0 0 14px;}
  .modal h3{font-family:var(--mono);font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:18px 0 8px;}
  .typelist{display:flex;flex-direction:column;gap:6px;}
  .typerow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;background:var(--ink-800);border:1px solid var(--line);border-radius:6px;padding:6px 8px;}
  .typerow input[type=text]{flex:1;}
  .typerow label{font-family:var(--mono);font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:4px;white-space:nowrap;}
  .typerow button{background:none;border:none;color:var(--mali);cursor:pointer;font-size:14px;padding:2px 6px;}
  .addrow{display:flex;gap:8px;margin-top:8px;}
  .addrow input{flex:1;}
  .addrow button{background:var(--ink-700);border:1px solid var(--line);color:var(--text-primary);border-radius:6px;padding:6px 10px;font-family:var(--mono);font-size:11.5px;cursor:pointer;}
  .modal-actions{display:flex;justify-content:space-between;margin-top:20px;gap:10px;}
  .primarybtn{background:var(--teal);border:none;color:var(--ink-950);font-family:var(--mono);font-weight:600;font-size:12px;padding:9px 16px;border-radius:7px;cursor:pointer;}
  .dangerbtn{background:none;border:1px solid var(--mali);color:var(--mali);font-family:var(--mono);font-size:11.5px;padding:9px 14px;border-radius:7px;cursor:pointer;}
  .closebtn{background:none;border:1px solid var(--line);color:var(--text-muted);font-family:var(--mono);font-size:11.5px;padding:9px 14px;border-radius:7px;cursor:pointer;}
  .schedule-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
  .schedule-fields label{font-family:var(--mono);font-size:10.5px;color:var(--text-muted);display:block;margin-bottom:3px;}
  .schedule-fields input{width:100%;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink-800);border:1px solid var(--line);color:var(--text-primary);
    font-family:var(--mono);font-size:12px;padding:10px 18px;border-radius:8px;opacity:0;
    transition:all .25s;pointer-events:none;z-index:60;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .loading{padding:60px 0;text-align:center;font-family:var(--mono);color:var(--text-muted);font-size:13px;}

  @media(max-width:640px){
    table, thead, tbody, tr, td{display:block;}
    thead{display:none;}
    tbody tr{padding:12px 10px;}
    td{padding:5px 0;}
    td.deltacell{display:flex;justify-content:space-between;align-items:center;}
    .balance-main .num{font-size:34px;}
  }
</style>
</head>
<body>
<div id="syncBadge" class="syncbadge sync-saving">● Connexion…</div>
<div class="wrap" id="app">
  <div class="loading">Chargement du carnet…</div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h2>Réglages — types de journée</h2>
    <h3>Présences</h3>
    <div class="typelist" id="presenceList"></div>
    <div class="addrow">
      <input type="text" id="newPresence" placeholder="Nouveau type de présence…">
      <button onclick="addType('presence')">Ajouter</button>
    </div>
    <h3>Absences</h3>
    <div class="typelist" id="absenceList"></div>
    <div class="addrow">
      <input type="text" id="newAbsence" placeholder="Nouveau type d'absence…">
      <button onclick="addType('absence')">Ajouter</button>
    </div>
    <h3>Horaire standard préchargé</h3>
    <div class="schedule-fields">
      <div><label>Arrivée matin</label><input type="time" id="cfgStart1"></div>
      <div><label>Fin matin</label><input type="time" id="cfgEnd1"></div>
      <div><label>Reprise après-midi</label><input type="time" id="cfgStart2"></div>
      <div><label>Fin après-midi</label><input type="time" id="cfgEnd2"></div>
    </div>
    <h3>Solde initial (report avant le début de l'encodage)</h3>
    <div class="schedule-fields" style="grid-template-columns:auto 1fr 1fr 1fr;align-items:end;">
      <div><label>Signe</label>
        <select id="cfgBalanceSign" style="width:100%;">
          <option value="+">+ (boni)</option>
          <option value="-">− (mali)</option>
        </select>
      </div>
      <div><label>Heures</label><input type="number" id="cfgBalanceH" min="0" step="1"></div>
      <div><label>Minutes</label><input type="number" id="cfgBalanceM" min="0" max="59" step="1"></div>
      <div><label>À la fin de</label><input type="month" id="cfgBalanceAsOf"></div>
    </div>
    <h3>Connexion GitHub (synchronisation)</h3>
    <div id="ghConnInfo" style="font-family:var(--mono);font-size:11.5px;color:var(--text-muted);"></div>
    <div class="modal-actions" style="margin-top:8px;">
      <button class="textbtn" onclick="ghDisconnect()">Changer de dépôt / déconnecter cet appareil</button>
    </div>
    <div class="modal-actions">
      <button class="dangerbtn" onclick="confirmResetAll()">Réinitialiser toutes les données</button>
      <div style="display:flex;gap:8px;">
        <button class="closebtn" onclick="closeSettings()">Annuler</button>
        <button class="primarybtn" onclick="saveSettings()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONSTANTES MÉTIER
   ============================================================ */
const DEFAULT_SCHEDULE = { start1:"08:10", end1:"12:00", start2:"12:30", end2:"16:16" };
const BREAK_MIN       = 30;               // pause obligatoire

const DEFAULT_PRESENCE_TYPES = [
  { id:"cpm",                label:"CPM" },
  { id:"teletravail",        label:"Télétravail" },
  { id:"formation",          label:"Formation" },
  { id:"mission",            label:"Mission" },
  { id:"mission_cpm",        label:"Mission + CPM" },
  { id:"mission_teletravail",label:"Mission + Télétravail" },
  { id:"teambuilding",       label:"Teambuilding" },
  { id:"cpm_niv2",           label:"CPM - Niv2",  afternoonEndOverride:"15:16" },
  { id:"cpm_niv2plus",       label:"CPM - Niv2+", afternoonEndOverride:"14:16" },
];
const DEFAULT_ABSENCE_TYPES = [
  { id:"maladie",     label:"Maladie",                   sick:true },
  { id:"circonstance",label:"Circonstance" },
  { id:"dispense",    label:"Dispense de service",       excludeFromOuvres:true },
  { id:"dispense_med",label:"Dispense médicale" },
  { id:"dispense_syn",label:"Dispense syndicale" },
  { id:"ferie",       label:"Jour férié",                excludeFromOuvres:true },
  { id:"conge",       label:"Congé" },
  { id:"conge_comp",  label:"Congé de compensation" },
  { id:"conge_reg",   label:"Congé réglementaire" },
  { id:"recup",       label:"Récupération en heures",    fullDayMali:true },
];
const MONTHLY_FORFAIT_MIN = 6*60; // 6h "sport/Culture" ajoutées chaque mois, au prorata si maladie
const CONFIG_VERSION = 3;


const DOW_NAMES = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const MONTH_NAMES = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

/* ============================================================
   ÉTAT
   ============================================================ */
let CONFIG = null;           // { presenceTypes, absenceTypes, schedule }
let currentMonthKey = null;  // "YYYY-MM"
let monthData = { days:{} }; // contenu du mois courant
let saveTimer = null;

/* ============================================================
   HELPERS TEMPS
   ============================================================ */
function toMin(hhmm){
  if(!hhmm) return null;
  const [h,m] = hhmm.split(":").map(Number);
  if(Number.isNaN(h)||Number.isNaN(m)) return null;
  return h*60+m;
}
function fmtDelta(min){
  const sign = min>0?"+":(min<0?"−":"");
  const a = Math.abs(min);
  const h = Math.floor(a/60), m = a%60;
  return `${sign}${h}h${String(m).padStart(2,"0")}`;
}
function fmtDur(min){
  const h = Math.floor(min/60), m = min%60;
  return `${h}h${String(m).padStart(2,"0")}`;
}
function pad(n){return String(n).padStart(2,"0");}
function monthKey(y,m){return `${y}-${pad(m+1)}`;}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}

/* ============================================================
   NOMBRES EN LETTRES (français de Belgique : septante / nonante)
   ============================================================ */
function wordsUnder1000(n){
  if(n<=0) return "";
  const units=["zéro","un","deux","trois","quatre","cinq","six","sept","huit","neuf"];
  const teens=["dix","onze","douze","treize","quatorze","quinze","seize","dix-sept","dix-huit","dix-neuf"];
  function tensWord(v){ // v in [1,99]
    if(v<10) return units[v];
    if(v<20) return teens[v-10];
    if(v<70){
      const names={2:"vingt",3:"trente",4:"quarante",5:"cinquante",6:"soixante"};
      const t=Math.floor(v/10), u=v%10, base=names[t];
      if(u===0) return base;
      if(u===1) return base+" et un";
      return base+"-"+units[u];
    }
    if(v<80){ const u=v-70; if(u===0) return "septante"; if(u===1) return "septante et un"; return "septante-"+units[u]; }
    if(v<90){ const u=v-80; if(u===0) return "quatre-vingts"; return "quatre-vingt-"+units[u]; }
    const u=v-90; if(u===0) return "nonante"; if(u===1) return "nonante et un"; return "nonante-"+units[u];
  }
  const h = Math.floor(n/100), r = n%100;
  let parts=[];
  if(h>0) parts.push(h===1 ? "cent" : units[h]+" cent"+(r===0?"s":""));
  if(r>0) parts.push(tensWord(r));
  return parts.join(" ");
}
function numberToFrenchWords(n){
  n = Math.round(n);
  if(n===0) return "zéro";
  const millions = Math.floor(n/1000000);
  const thousands = Math.floor((n%1000000)/1000);
  const rest = n%1000;
  let parts=[];
  if(millions>0) parts.push((millions===1?"un":wordsUnder1000(millions))+" million"+(millions>1?"s":""));
  if(thousands>0) parts.push(thousands===1?"mille":wordsUnder1000(thousands)+" mille");
  if(rest>0) parts.push(wordsUnder1000(rest));
  return parts.join(" ");
}
function balanceInWords(totalMin){
  const abs = Math.abs(Math.round(totalMin));
  const h = Math.floor(abs/60), m = abs%60;
  let words;
  if(h===0){
    words = numberToFrenchWords(m) + (m>1?" minutes":" minute");
  } else {
    words = numberToFrenchWords(h) + (h>1?" heures":" heure");
    if(m>0) words += " et " + numberToFrenchWords(m) + (m>1?" minutes":" minute");
  }
  if(totalMin>0) return "Boni de " + words;
  if(totalMin<0) return "Mali de " + words;
  return "Solde équilibré — zéro heure";
}

/* ============================================================
   STOCKAGE — synchronisé via un fichier JSON dans un dépôt GitHub
   ============================================================ */
const GH_CONF_KEY = "horaire-gh-conf"; // localStorage : identifiants de connexion (par appareil)
let GH = null;           // { owner, repo, token, path, branch }
let GH_DATA = {};        // miroir en mémoire de tout le contenu stocké
let GH_SHA = null;       // sha du fichier distant (nécessaire pour chaque écriture)
let GH_DIRTY = false;
let GH_SAVE_TIMER = null;
let GH_SAVING = false;

function ghLoadConfFromLocal(){
  try{ const raw = localStorage.getItem(GH_CONF_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function ghSaveConfToLocal(conf){
  try{ localStorage.setItem(GH_CONF_KEY, JSON.stringify(conf)); }catch(e){}
}
function ghClearConfLocal(){
  try{ localStorage.removeItem(GH_CONF_KEY); }catch(e){}
}
function ghHeaders(){
  return { "Authorization": `Bearer ${GH.token}`, "Accept":"application/vnd.github+json", "Content-Type":"application/json" };
}
function ghUrl(){
  return `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${encodeURIComponent(GH.path).replace(/%2F/g,"/")}`;
}
function b64EncodeUnicode(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64DecodeUnicode(str){ return decodeURIComponent(escape(atob(str))); }

async function ghTestConnection(conf){
  const res = await fetch(`https://api.github.com/repos/${conf.owner}/${conf.repo}`, {
    headers: { "Authorization": `Bearer ${conf.token}`, "Accept":"application/vnd.github+json" }
  });
  if(res.status===401) throw new Error("Jeton invalide, expiré, ou sans accès à ce dépôt.");
  if(res.status===404) throw new Error("Dépôt introuvable — vérifie le nom d'utilisateur et le nom du dépôt.");
  if(!res.ok) throw new Error(`Erreur GitHub (${res.status})`);
  return true;
}

async function ghFetchStore(){
  const res = await fetch(ghUrl() + `?ref=${GH.branch}`, { headers: ghHeaders() });
  if(res.status === 404){ GH_DATA = {}; GH_SHA = null; return; }
  if(!res.ok) throw new Error(`GitHub GET ${res.status}`);
  const json = await res.json();
  GH_SHA = json.sha;
  const content = b64DecodeUnicode((json.content||"").replace(/\n/g,""));
  try{ GH_DATA = content ? JSON.parse(content) : {}; }catch(e){ GH_DATA = {}; }
}

async function ghPushStore(){
  const body = { message:"Mise à jour horaire", content: b64EncodeUnicode(JSON.stringify(GH_DATA)), branch: GH.branch };
  if(GH_SHA) body.sha = GH_SHA;
  const res = await fetch(ghUrl(), { method:"PUT", headers: ghHeaders(), body: JSON.stringify(body) });
  if(!res.ok){ const t = await res.text().catch(()=> ""); throw new Error(`GitHub PUT ${res.status}: ${t}`); }
  const json = await res.json();
  GH_SHA = json.content.sha;
}

function updateSyncIndicator(state){
  const el = document.getElementById("syncBadge");
  if(!el) return;
  const map = {
    saving:  { txt:"● Enregistrement…", cls:"sync-saving" },
    synced:  { txt:"● Synchronisé",     cls:"sync-ok" },
    error:   { txt:"● Erreur de synchro — nouvelle tentative…", cls:"sync-error" },
    offline: { txt:"● Hors ligne",      cls:"sync-error" },
  };
  const s = map[state] || map.synced;
  el.textContent = s.txt;
  el.className = "syncbadge " + s.cls;
}

function ghScheduleSave(){
  GH_DIRTY = true;
  updateSyncIndicator("saving");
  clearTimeout(GH_SAVE_TIMER);
  GH_SAVE_TIMER = setTimeout(ghFlush, 700);
}
async function ghFlush(){
  if(GH_SAVING || !GH_DIRTY) return;
  GH_SAVING = true;
  try{
    const before = await fetch(ghUrl() + `?ref=${GH.branch}`, { headers: ghHeaders() });
    if(before.ok){ const j = await before.json(); GH_SHA = j.sha; }
    else if(before.status===404){ GH_SHA = null; }
    await ghPushStore();
    GH_DIRTY = false;
    updateSyncIndicator("synced");
  }catch(e){
    console.error("Échec de synchronisation GitHub", e);
    updateSyncIndicator(navigator.onLine ? "error" : "offline");
  } finally {
    GH_SAVING = false;
    if(GH_DIRTY) GH_SAVE_TIMER = setTimeout(ghFlush, 3000);
  }
}

// API compatible avec l'ancienne interface window.storage utilisée dans tout le reste de l'app
async function storageGet(key, shared=false){
  const k = shared ? `shared:${key}` : key;
  return Object.prototype.hasOwnProperty.call(GH_DATA, k) ? GH_DATA[k] : null;
}
async function storageSet(key, value, shared=false){
  const k = shared ? `shared:${key}` : key;
  GH_DATA[k] = value;
  ghScheduleSave();
  return { key, value, shared };
}
async function storageDelete(key, shared=false){
  const k = shared ? `shared:${key}` : key;
  const existed = Object.prototype.hasOwnProperty.call(GH_DATA, k);
  delete GH_DATA[k];
  ghScheduleSave();
  return existed ? { key, deleted:true, shared } : null;
}
async function storageList(prefix, shared=false){
  return Object.keys(GH_DATA)
    .filter(k => shared ? k.startsWith("shared:") : !k.startsWith("shared:"))
    .map(k => shared ? k.slice(7) : k)
    .filter(k => !prefix || k.startsWith(prefix));
}

    addIfMissing(presenceTypes, { id:"cpm_niv2plus",         label:"CPM - Niv2+", afternoonEndOverride:"14:16" });

/* ============================================================
   CALCUL D'UNE JOURNÉE
   ============================================================ */
// entry = { kind:"presence"|"absence"|"", typeId, start1,end1,start2,end2, doubleOT, note }
function computeDay(entry){
  if(!entry || !entry.kind){
    return { status:"empty", workedMin:0, deltaMin:0, breakWarn:false };
  }
  if(entry.kind === "absence"){
    const typeDef = CONFIG.absenceTypes.find(t=>t.id===entry.typeId);
    const isFullMali = !!(typeDef && typeDef.fullDayMali);
    const deltaMin = isFullMali ? -dayTargetMin() : 0;
    return {
      status:"absence", workedMin:0, deltaMin, breakWarn:false,
      sick: !!(typeDef && typeDef.sick),
      excludeFromOuvres: !!(typeDef && typeDef.excludeFromOuvres),
      fullDayMali: isFullMali,
    };
  }
  // presence
  const s1 = toMin(entry.start1), e1 = toMin(entry.end1);
  const s2 = toMin(entry.start2), e2 = toMin(entry.end2);
  if(s1==null||e1==null||s2==null||e2==null){
    return { status:"presence", workedMin:0, deltaMin:0, breakWarn:false, incomplete:true };
  }
  // migration / valeurs par défaut pour les entrées existantes
  const beforeMode = entry.beforeMode || (entry.before810 ? "simple" : "none");
  const otMode = entry.otMode || (entry.doubleOT ? "double" : "none");

  // seuils dynamiques : basés sur l'horaire configuré, avec override éventuel du type de présence
  // (ex : "CPM - Niv2" termine à 15h16 sans mali, "CPM - Niv2+" à 14h16)
  const dayStartFloor = toMin(CONFIG.schedule.start1);
  const presenceTypeDef = CONFIG.presenceTypes.find(t=>t.id===entry.typeId);
  const otThreshold = (presenceTypeDef && presenceTypeDef.afternoonEndOverride)
    ? toMin(presenceTypeDef.afternoonEndOverride)
    : toMin(CONFIG.schedule.end2);

  const preMin = Math.max(0, dayStartFloor - s1); // minutes avant 8h10, s'il en existe
  const beforeFactor = beforeMode==="double" ? 2 : (beforeMode==="simple" ? 1 : 0);
  const morningBaseMin = Math.max(0, e1 - Math.max(s1, dayStartFloor));
  const morningMin = morningBaseMin + preMin*beforeFactor;

  // pause obligatoire de 30' : la reprise effective ne peut pas être avant end1+30
  const minResume = e1 + BREAK_MIN;
  const breakWarn = (s2 - e1) < BREAK_MIN;
  const effStart2 = Math.max(s2, minResume);

  const baseEnd2 = Math.min(e2, otThreshold);
  const afternoonBaseMin = Math.max(0, baseEnd2 - effStart2);

  const overtimeMin = Math.max(0, e2 - otThreshold);
  const otFactor = otMode==="double" ? 2 : (otMode==="simple" ? 1 : 0);
  const overtimeCounted = overtimeMin * otFactor;

  const workedMin = morningMin + afternoonBaseMin + overtimeCounted;
  const targetMin = (toMin(CONFIG.schedule.end1)-toMin(CONFIG.schedule.start1)) + (otThreshold - toMin(CONFIG.schedule.start2));
  const deltaMin = workedMin - targetMin;

  return { status:"presence", workedMin, deltaMin, breakWarn, overtimeMin, preMin, targetMin, beforeMode, otMode, otThreshold };
}

function dayTargetMin(){
  const s = CONFIG.schedule;
  return (toMin(s.end1)-toMin(s.start1)) + (toMin(s.end2)-toMin(s.start2));
}

/* ============================================================
   STATISTIQUES POUR UN MOIS DONNÉ (fonction partagée)
   ============================================================ */
function computeStatsForMonth(data, key){
  const [y,m] = key.split("-").map(Number);
  if(!y||!m) return { joursOuvres:0, joursMaladie:0, joursRenseignes:0, sommeDelta:0, boniSum:0, maliSum:0, forfait:0, total:0, ratio:1 };
  const nDays = daysInMonth(y, m-1);
  let joursOuvres = 0, joursMaladie = 0, joursRenseignes = 0, sommeDelta = 0, boniSum = 0, maliSum = 0;

  for(let d=1; d<=nDays; d++){
    const dow = new Date(y, m-1, d).getDay();
    if(dow===0 || dow===6) continue; // week-end : jamais un jour ouvré
    const dateStr = `${key}-${pad(d)}`;
    const entry = data.days[dateStr];
    const c = computeDay(entry);
    if(c.status==="absence" && c.excludeFromOuvres){
      // jour férié / dispense de service : exclu des jours ouvrés, n'entre dans aucun calcul
      continue;
    }
    joursOuvres++;
    if(c.status==="absence" && c.sick) joursMaladie++;
    if(c.status!=="empty"){ joursRenseignes++; }
    const d1 = c.deltaMin || 0;
    sommeDelta += d1;
    if(d1>0) boniSum += d1;
    else if(d1<0) maliSum += -d1;
  }

  const ratio = joursOuvres>0 ? (joursOuvres-joursMaladie)/joursOuvres : 1;
  const forfait = Math.round(MONTHLY_FORFAIT_MIN * ratio);
  const total = sommeDelta + forfait;

  return { joursOuvres, joursMaladie, joursRenseignes, sommeDelta, boniSum, maliSum, forfait, total, ratio };
}

/* ============================================================
   TABLEAU DE BORD (ventilation du mois)
   ============================================================ */
function computeDashboardForMonth(data, key){
  const [y,m] = key.split("-").map(Number);
  const nDays = daysInMonth(y, m-1);
  const presenceCounts = {}; // typeId -> jours
  const absenceCounts = {};  // typeId -> jours
  let joursPrestes=0, joursNonOuvres=0, joursVides=0, joursAvecHeuresSup=0, totalOvertimeMin=0;

  for(let d=1; d<=nDays; d++){
    const dow = new Date(y, m-1, d).getDay();
    if(dow===0 || dow===6) continue;
    const dateStr = `${key}-${pad(d)}`;
    const entry = data.days[dateStr];
    const c = computeDay(entry);
    if(c.status==="absence" && c.excludeFromOuvres){ joursNonOuvres++; continue; }
    if(c.status==="empty"){ joursVides++; continue; }
    if(c.status==="presence"){
      joursPrestes++;
      presenceCounts[entry.typeId] = (presenceCounts[entry.typeId]||0) + 1;
      const hasOT = (c.beforeMode && c.beforeMode!=="none") || (c.otMode && c.otMode!=="none");
      if(hasOT) joursAvecHeuresSup++;
    } else if(c.status==="absence"){
      absenceCounts[entry.typeId] = (absenceCounts[entry.typeId]||0) + 1;
    }
  }
  return { presenceCounts, absenceCounts, joursPrestes, joursNonOuvres, joursVides, joursAvecHeuresSup };
}
function labelFor(kind, typeId){
  const list = kind==="presence" ? CONFIG.presenceTypes : CONFIG.absenceTypes;
  const t = list.find(x=>x.id===typeId);
  return t ? t.label : typeId;
}
function breakdownRowsHtml(counts, kind){
  const entries = Object.keys(counts).map(id=>({id, label:labelFor(kind,id), n:counts[id]}));
  entries.sort((a,b)=>a.label.localeCompare(b.label,"fr",{sensitivity:"base"}));
  if(!entries.length) return `<div class="bd-empty">—</div>`;
  return entries.map(e=>`<div class="bd-row"><span>${escapeHtml(e.label)}</span><span class="bd-count">${e.n} j.</span></div>`).join("");
}

/* ============================================================
   SOLDE REPORTÉ (mois précédents) + SOLDE GÉNÉRAL
   ============================================================ */
async function computeCarryOver(){
  const keys = await storageList("horaire-month:");
  let reported = 0;
  const ob = CONFIG.openingBalance;
  if(ob && ob.asOf && ob.asOf < currentMonthKey){
    reported += ob.minutes;
  }
  for(const k of keys){
    const key = k.replace("horaire-month:","");
    if(key >= currentMonthKey) continue; // uniquement les mois strictement antérieurs
    if(ob && ob.asOf && key <= ob.asOf) continue; // déjà couvert par le solde initial
    const raw = await storageGet(k);
    let data;
    try{ data = raw ? JSON.parse(raw) : {days:{}}; }catch(e){ data = {days:{}}; }
    reported += computeStatsForMonth(data, key).total;
  }
  return reported;
}

   RENDU
   ============================================================ */
function sortedByLabel(list){
  return [...list].sort((a,b)=>a.label.localeCompare(b.label, "fr", {sensitivity:"base"}));
}
function typeOptionsHtml(entry){
  const sel = entry ? entry.typeId : "";
  let html = `<option value="">— Non renseigné —</option>`;

  sortedByLabel(CONFIG.presenceTypes).forEach(t=>{
    html += `<option value="presence:${t.id}" ${entry&&entry.kind==="presence"&&sel===t.id?"selected":""}>${escapeHtml(t.label)}</option>`;
  });
  html += `</optgroup><optgroup label="Absence">`;
  sortedByLabel(CONFIG.absenceTypes).forEach(t=>{
    html += `<option value="absence:${t.id}" ${entry&&entry.kind==="absence"&&sel===t.id?"selected":""}>${escapeHtml(t.label)}</option>`;
  });
  html += `</optgroup>`;
  return html;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

      let tag = c.sick ? "maladie" : (c.excludeFromOuvres ? "jour non ouvré" : "absence");
      deltaCell = c.fullDayMali
        ? `<td class="deltacell mali">${fmtDelta(c.deltaMin)}<span class="worked-min"><span class="tag">${tag}</span></span></td>`
        : `<td class="deltacell zero"><span class="tag">${tag}</span></td>`;
    } else if(c.incomplete){
      deltaCell = `<td class="deltacell zero empty-flag">heures incomplètes</td>`;
    } else {
      const cls = c.deltaMin>0?"boni":(c.deltaMin<0?"mali":"zero");
      deltaCell = `<td class="deltacell ${cls}">${fmtDelta(c.deltaMin)}<span class="worked-min">${fmtDur(c.workedMin)} prestées</span></td>`;
    }

    rows += `<tr class="${rowClass.join(' ')}">
      <td class="daycell"><span class="daynum">${pad(d)}</span> <span class="dayname">${DOW_NAMES[dow]}</span></td>
      ${bodyCell}
      ${deltaCell}
    </tr>`;
  }

  app.innerHTML = `
    <div class="cardhead">
      <div class="cardhead-top">
        <div class="eyebrow"><span class="dot"></span> Carnet de pointage</div>
        <div class="monthnav">
          <button onclick="changeMonth(-1)">‹</button>
          <div class="monthlabel">${MONTH_NAMES[m-1]} ${y}</div>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="titlebar"><h1>Horaire</h1></div>
      <div class="balance-row">
        <div class="balance-main">
          <div class="num ${totalClass}">${fmtDelta(summary.total)}<span class="badge ${totalClass}">${summary.total>0?'Boni':(summary.total<0?'Mali':'Équilibré')}</span></div>
          <div class="lbl">Solde du mois (heures sport/culture incluses)</div>
        </div>
        <div class="stat">
          <div class="num boni">${fmtDelta(summary.boniSum)}</div>
          <div class="lbl">Boni du mois</div>
        </div>
        <div class="stat">
          <div class="num mali">${fmtDelta(-summary.maliSum)}</div>
          <div class="lbl">Mali du mois</div>
        </div>
        <div class="stat">
          <div class="num" style="color:var(--amber)">${fmtDelta(summary.forfait)}</div>
          <div class="lbl">Heures sport/Culture</div>
        </div>
        <div class="stat">
          <div class="num" style="color:var(--text-primary)">${summary.joursMaladie}</div>
          <div class="lbl">Jours maladie</div>
        </div>
      </div>
      <div class="punchdots">${dots}</div>
      <div class="lifetime">
        <div>Reporté des mois précédents : <b class="val ${reportedClass}">${fmtDelta(reported)}</b> &nbsp;+&nbsp; solde du mois : <b class="val ${totalClass==='zero'?'':totalClass}">${fmtDelta(summary.total)}</b> &nbsp;=&nbsp; solde général : <b class="val ${generalClass}">${fmtDelta(general)}</b></div>
        <div style="font-style:italic;color:var(--text-faint);margin-top:3px;">${escapeHtml(balanceInWords(general))}</div>
        <div>${summary.joursRenseignes}/${summary.joursOuvres} jours ouvrés renseignés</div>
      </div>
    </div>

    <div class="tablewrap">
      <table>
        <thead><tr>
          <th style="width:90px;">Jour</th>
          <th style="width:190px;">Type</th>
          <th>Détail</th>
          <th style="width:150px;">Boni / Mali</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="summary">
      <div class="cell"><div class="num">${summary.joursOuvres}</div><div class="lbl">Jours ouvrés</div></div>
      <div class="cell"><div class="num">${summary.joursMaladie}</div><div class="lbl">Jours maladie</div></div>
      <div class="cell"><div class="num">${summary.joursOuvres-summary.joursMaladie}</div><div class="lbl">Base du prorata (ouvrés − maladie)</div></div>
      <div class="cell"><div class="num" style="color:var(--amber)">${(summary.ratio*100).toFixed(0)}%</div><div class="lbl">Ratio sport/Culture</div></div>
      <div class="formula"><b>Heures sport/Culture</b> = 6h × (${summary.joursOuvres} − ${summary.joursMaladie}) / ${summary.joursOuvres} = <b>${fmtDur(summary.forfait)}</b> &nbsp;·&nbsp; <b>Solde du mois</b> = cumul journalier ${fmtDelta(summary.sommeDelta)} + sport/culture ${fmtDelta(summary.forfait)} = <b>${fmtDelta(summary.total)}</b></div>
    </div>

    <div class="dashboard">
      <div class="dash-title">Tableau de bord — ${MONTH_NAMES[m-1]} ${y}</div>
      <div class="dash-grid">
        <div class="dash-card">
          <div class="dash-card-num">${summary.joursOuvres}</div>
          <div class="dash-card-lbl">1. Jours ouvrés</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-num" style="color:var(--teal)">${dash.joursPrestes}</div>
          <div class="dash-card-lbl">3. Jours prestés<br><span style="opacity:.75;">(droit à ticket repas)</span></div>
        </div>
        <div class="dash-card">
          <div class="dash-card-num" style="color:var(--amber)">${dash.joursNonOuvres}</div>
          <div class="dash-card-lbl">4. Jours non ouvrés<br><span style="opacity:.75;">(fériés / dispense)</span></div>
        </div>
        <div class="dash-card">
          <div class="dash-card-num" style="color:var(--text-muted)">${dash.joursVides}</div>
          <div class="dash-card-lbl">4. Jours à renseigner</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-num" style="color:var(--boni)">${dash.joursAvecHeuresSup}</div>
          <div class="dash-card-lbl">4. Jours avec heures avant/après comptées</div>
        </div>
      </div>
      <div class="dash-breakdown">
        <div class="bd-col">
          <div class="bd-title">2. Ventilation — Présences</div>
          ${breakdownRowsHtml(dash.presenceCounts, "presence")}
        </div>
        <div class="bd-col">
          <div class="bd-title">2. Ventilation — Absences</div>
          ${breakdownRowsHtml(dash.absenceCounts, "absence")}
        </div>
      </div>
    </div>

    <div class="footerbar">
      <button class="textbtn" onclick="clearMonth()">Vider ce mois</button>
      <button class="settingsbtn" onclick="openSettings()">⚙ Réglages des types &amp; horaire</button>
    </div>
  `;
}

/* ============================================================
   ACTIONS
   ============================================================ */
async function changeType(dateStr, value){
  if(!value){
    delete monthData.days[dateStr];
    scheduleSave();
    await render();
    return;
  }
  const [kind, typeId] = value.split(":");
  const existing = monthData.days[dateStr];
  let entry = { kind, typeId };
  if(kind === "presence"){
    entry.start1 = (existing&&existing.start1) || CONFIG.schedule.start1;
    entry.end1   = (existing&&existing.end1)   || CONFIG.schedule.end1;
    entry.start2 = (existing&&existing.start2) || CONFIG.schedule.start2;
    entry.end2   = (existing&&existing.end2)   || CONFIG.schedule.end2;
    entry.beforeMode = existing ? (existing.beforeMode || (existing.before810 ? "simple" : "none")) : "none";
    entry.otMode = existing ? (existing.otMode || (existing.doubleOT ? "double" : "none")) : "none";
  } else {
    entry.note = (existing && existing.note) || "";
  }
  monthData.days[dateStr] = entry;
  scheduleSave();
  await render();
}

async function updateField(dateStr, field, value){
  if(!monthData.days[dateStr]) return;
  monthData.days[dateStr][field] = value;
  scheduleSave();
  await render();
}

async function changeMonth(delta){
  let [y,m] = currentMonthKey.split("-").map(Number);
  m += delta;
  if(m<1){ m=12; y--; } else if(m>12){ m=1; y++; }
  currentMonthKey = monthKey(y, m-1);
  monthData = await loadMonth(currentMonthKey);
  await render();
}

async function clearMonth(){
  if(!confirm(`Vider toutes les données de ${currentMonthKey} ? Cette action est irréversible.`)) return;
  monthData = { days:{} };
  await storageSet(`horaire-month:${currentMonthKey}`, JSON.stringify(monthData));
  showToast("Mois vidé");
  await render();
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 1800);
}

/* ============================================================
   RÉGLAGES
   ============================================================ */
function renderTypeList(containerId, list, kind){
  const el = document.getElementById(containerId);
  const display = sortedByLabel(list);
  el.innerHTML = display.map(t=>`
    <div class="typerow">
      <input type="text" value="${escapeHtml(t.label)}" onchange="editTypeLabel('${kind}','${t.id}',this.value)">
      ${kind==='absence' ? `
        <label><input type="checkbox" ${t.sick?'checked':''} onchange="editTypeFlag('${t.id}','sick',this.checked)"> maladie</label>
        <label><input type="checkbox" ${t.excludeFromOuvres?'checked':''} onchange="editTypeFlag('${t.id}','excludeFromOuvres',this.checked)"> jour non ouvré</label>
        <label><input type="checkbox" ${t.fullDayMali?'checked':''} onchange="editTypeFlag('${t.id}','fullDayMali',this.checked)"> mali plein</label>
      ` : ""}
      ${kind==='presence' ? `<label><input type="checkbox" ${t.afternoonEndOverride?'checked':''} onchange="editTypeOverride('${t.id}',this.checked)"> fin anticipée</label>` : ""}
      <button onclick="removeType('${kind}','${t.id}')" title="Supprimer">✕</button>
    </div>
  `).join("");
}

function openSettings(){
  renderTypeList("presenceList", CONFIG.presenceTypes, "presence");
  renderTypeList("absenceList", CONFIG.absenceTypes, "absence");
  document.getElementById("cfgStart1").value = CONFIG.schedule.start1;
  document.getElementById("cfgEnd1").value = CONFIG.schedule.end1;
  document.getElementById("cfgStart2").value = CONFIG.schedule.start2;
  document.getElementById("cfgEnd2").value = CONFIG.schedule.end2;
  const ob = CONFIG.openingBalance;
  const obMin = ob ? Math.abs(ob.minutes) : 0;
  document.getElementById("cfgBalanceSign").value = (ob && ob.minutes<0) ? "-" : "+";
  document.getElementById("cfgBalanceH").value = Math.floor(obMin/60);
  document.getElementById("cfgBalanceM").value = obMin%60;
  document.getElementById("cfgBalanceAsOf").value = (ob && ob.asOf) || "";
  document.getElementById("ghConnInfo").textContent = GH ? `Connecté à ${GH.owner}/${GH.repo} (${GH.path})` : "Non connecté";
  document.getElementById("settingsOverlay").classList.add("show");
}
function closeSettings(){
  document.getElementById("settingsOverlay").classList.remove("show");
}
function editTypeLabel(kind, id, value){
  const list = kind==="presence" ? CONFIG.presenceTypes : CONFIG.absenceTypes;
  const t = list.find(x=>x.id===id);
  if(t) t.label = value;
}
function editTypeFlag(id, flag, checked){
  const t = CONFIG.absenceTypes.find(x=>x.id===id);
  if(t) t[flag] = checked;
}
function editTypeOverride(id, checked){
  const t = CONFIG.presenceTypes.find(x=>x.id===id);
  if(!t) return;
  if(checked){
    const val = prompt("Heure de fin anticipée pour ce type (ex: 15:16) :", t.afternoonEndOverride || CONFIG.schedule.end2);
    t.afternoonEndOverride = val || CONFIG.schedule.end2;
  } else {
    delete t.afternoonEndOverride;
  }
  renderTypeList("presenceList", CONFIG.presenceTypes, "presence");
}
function removeType(kind, id){
  const list = kind==="presence" ? CONFIG.presenceTypes : CONFIG.absenceTypes;
  const idx = list.findIndex(x=>x.id===id);
  if(idx>=0) list.splice(idx,1);
  renderTypeList(kind==="presence"?"presenceList":"absenceList", list, kind);
}
function slugify(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"") || ("t"+Date.now());
}
function addType(kind){
  const inputId = kind==="presence" ? "newPresence" : "newAbsence";
  const input = document.getElementById(inputId);
  const label = input.value.trim();
  if(!label) return;
  const list = kind==="presence" ? CONFIG.presenceTypes : CONFIG.absenceTypes;
  let id = slugify(label);
  if(list.some(t=>t.id===id)) id = id + "_" + Date.now().toString(36);
  const entry = { id, label };
  if(kind==="absence") { entry.sick = false; entry.excludeFromOuvres = false; entry.fullDayMali = false; }
  list.push(entry);
  input.value = "";
  renderTypeList(kind==="presence"?"presenceList":"absenceList", list, kind);
}
async function saveSettings(){
  CONFIG.schedule = {
    start1: document.getElementById("cfgStart1").value || DEFAULT_SCHEDULE.start1,
    end1:   document.getElementById("cfgEnd1").value   || DEFAULT_SCHEDULE.end1,
    start2: document.getElementById("cfgStart2").value || DEFAULT_SCHEDULE.start2,
    end2:   document.getElementById("cfgEnd2").value   || DEFAULT_SCHEDULE.end2,
  };
  const sign = document.getElementById("cfgBalanceSign").value === "-" ? -1 : 1;
  const h = parseInt(document.getElementById("cfgBalanceH").value, 10) || 0;
  const m = parseInt(document.getElementById("cfgBalanceM").value, 10) || 0;
  const asOf = document.getElementById("cfgBalanceAsOf").value;
  CONFIG.openingBalance = (asOf || h || m) ? { minutes: sign*(h*60+m), asOf: asOf || currentMonthKey } : null;

  const ok = await storageSet("horaire-config", JSON.stringify(CONFIG));
  showToast(ok ? "Réglages enregistrés" : "Échec de l'enregistrement");
  closeSettings();
  await render();
}
async function confirmResetAll(){
  if(!confirm("Réinitialiser TOUTES les données (tous les mois + réglages) ? Cette action est irréversible.")) return;
  const keys = await storageList("horaire-month:");
  for(const k of keys){ await storageDelete(k); }
  await storageDelete("horaire-config");
  clearTimeout(GH_SAVE_TIMER);
  await ghFlush(); // envoi immédiat, sans repasser par un re-fetch qui écraserait ces suppressions
  showToast("Toutes les données ont été réinitialisées");
  closeSettings();
  await startApp();
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  document.getElementById("app").innerHTML = `<div class="loading">Chargement du carnet…</div>`;
  const conf = ghLoadConfFromLocal();
  if(!conf){
    showConnectWizard();
    return;
  }
  GH = conf;
  try{
    await ghFetchStore();
  }catch(e){
    console.error(e);
    document.getElementById("app").innerHTML = `<div class="loading">Impossible de contacter GitHub (${escapeHtml(e.message||"erreur réseau")}).<br><br><button class="settingsbtn" onclick="location.reload()">Réessayer</button> &nbsp; <button class="textbtn" onclick="ghDisconnect()">Changer de connexion</button></div>`;
    return;
  }
  await startApp();
}

async function startApp(){
  await loadConfig();
  const now = new Date();
  currentMonthKey = monthKey(now.getFullYear(), now.getMonth());
  monthData = await loadMonth(currentMonthKey);
  await render();
  updateSyncIndicator("synced");
}

function ghDisconnect(){
  if(!confirm("Déconnecter cet appareil ? Tu devras ressaisir le dépôt et le jeton pour t'y reconnecter. Tes données restent intactes sur GitHub.")) return;
  ghClearConfLocal();
  location.reload();
}

function showConnectWizard(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="cardhead" style="max-width:480px;margin:40px auto;">
      <div class="eyebrow"><span class="dot"></span> Connexion à ton dépôt GitHub</div>
      <div class="titlebar"><h1 style="font-size:18px;">Carnet de pointage</h1></div>
      <p style="font-family:var(--sans);font-size:13px;color:var(--text-muted);line-height:1.6;margin-top:10px;">
        Tes données sont stockées dans un fichier JSON de ton dépôt GitHub, pour se synchroniser entre tous tes appareils.
        Un jeton d'accès personnel (scope <b style="color:var(--text-primary);">Contents: Read and write</b>, limité à ce dépôt) est nécessaire.
      </p>
      <div class="schedule-fields" style="grid-template-columns:1fr;margin-top:16px;">
        <div><label>Nom d'utilisateur GitHub</label><input type="text" id="wizOwner" placeholder="ex: opretto"></div>
        <div><label>Nom du dépôt</label><input type="text" id="wizRepo" placeholder="ex: horaire-prive"></div>
        <div><label>Jeton d'accès personnel (fine-grained)</label><input type="password" id="wizToken" placeholder="github_pat_…"></div>
      </div>
      <div id="wizError" style="color:var(--mali);font-family:var(--mono);font-size:12px;margin-top:10px;"></div>
      <div class="modal-actions" style="justify-content:flex-end;">
        <button class="primarybtn" onclick="wizardConnect()">Se connecter</button>
      </div>
      <p style="font-family:var(--mono);font-size:11px;color:var(--text-faint);margin-top:14px;">
        Besoin d'aide pour créer le dépôt ou le jeton ? Voir README.md dans le dépôt du projet.
      </p>
    </div>
  `;
}

async function wizardConnect(){
  const owner = document.getElementById("wizOwner").value.trim();
  const repo  = document.getElementById("wizRepo").value.trim();
  const token = document.getElementById("wizToken").value.trim();
  const errEl = document.getElementById("wizError");
  errEl.textContent = "";
  if(!owner || !repo || !token){ errEl.textContent = "Merci de remplir les trois champs."; return; }
  const conf = { owner, repo, token, path:"data/horaire-store.json", branch:"main" };
  try{
    await ghTestConnection(conf);
    GH = conf;
    await ghFetchStore();
    ghSaveConfToLocal(conf);
    await startApp();
  }catch(e){
    errEl.textContent = e.message || "Connexion impossible.";
  }
}

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./sw.js").catch(e=>console.warn("SW non enregistré", e));
  });
}

init();
</script>
